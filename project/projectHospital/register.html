
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Registration Form</title>
</head>
<body class="bg-gradient-to-r from-cyan-500 via-blue-500 to-indigo-600 min-h-screen flex items-center justify-center">

    <div class="bg-white/90 backdrop-blur-lg p-8 rounded-3xl shadow-2xl w-[380px]">

        <h2 class="text-3xl font-bold text-center text-blue-700 mb-6">
            Register User
        </h2>

        <div class="space-y-4">

            <input
                type="text"
                id="name"
                placeholder="👤 Enter Name"
                class="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none">

            <input
                type="email"
                id="email"
                placeholder="📧 Enter Email"
                class="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none">

                 <input
                type="password"
                id="password"
                placeholder="🔑 Enter Password"
                class="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none">
            <input
                type="number"
                id="age"
                placeholder="🎂 Enter Age"
                class="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none">

            <input
                type="tel"
                id="mobile"
                placeholder="📱 Enter Mobile"
                class="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none">

            <button
                onclick="register()"
                
                class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 text-white py-3 rounded-xl font-semibold hover:scale-105 hover:shadow-xl transition duration-300">
                Register
            </button>

        </div>

        <div id="card" class="mt-6"></div>

        

    </div>

    <script>
        function register() {

            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let age = document.getElementById("age").value;
            let mobile = document.getElementById("mobile").value;

            document.getElementById("card").innerHTML = `
                <div class="bg-gradient-to-r   text-white rounded-2xl p-5 ">

                    <h3 class="text-xl font-bold text-center mb-3">
                        ✅ Registration Successful
                    </h3>

                    <p><span class="font-semibold">👤 Name:</span> ${name}</p>
                    <p><span class="font-semibold">📧 Email:</span> ${email}</p>
                
                    <p><span class="font-semibold">🎂 Age:</span> ${age}</p>
                    <p><span class="font-semibold">📱 Mobile:</span> ${mobile}</p>
                       
                </div>
            `;
            alert(" ✅ Registration Successful");
        }
    </script>



</body>
</html>
