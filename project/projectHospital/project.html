<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteCare Hospital Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="flex h-screen">

    <!-- Sidebar -->
    <div class="w-64 bg-blue-900 text-white flex flex-col">

        <!-- Logo -->
        <div class="flex items-center gap-3 p-5 border-b border-blue-700">
            <img src="assete/image/download.png lo0.png" class="w-12 h-12 rounded-full" alt="">
            <div>
                <h2 class="font-bold text-lg">EliteCare</h2>
                <p class="text-sm text-blue-200">Hospital</p>
            </div>
        </div>

        <!-- Menu -->
        <nav class="flex flex-col mt-5 gap-10 p-10">
            <a href="#kj" class=" hover:bg-blue-700 bg-blue-800 p-3 rounded-xl">🏠 Dashboard</a>
               
            <a href="#room" class=" hover:bg-blue-700 bg-blue-800 p-3 rounded-xl">🛏 Room Vacancy</a>
            <a href="../projectHospital/Facilities.html" class="hover:bg-blue-700 bg-blue-800 p-3 rounded-xl">👨‍⚕ facilities</a>
           
            <a href="../projectHospital/appointOne.html" class=" hover:bg-blue-700 bg-blue-800 p-3 rounded-xl">📅 Appointments</a>
    
           
        </nav>

    

    </div>

    <!-- Main Content -->
    <main  class="flex-1 overflow-y-auto">

        <!-- Header -->
        <header   id="kj" class="bg-white shadow flex  justify-between items-center  p-3">
            <h1 class="text-3xl font-bold text-gray-700">
                Dashboard
            </h1>

            <div class="flex items-center gap-4">
                <input type="text"
                    placeholder="Search..."
                    class="border rounded-lg px-4 py-2">

               
            </div>
        </header>

        <!-- Dashboard Cards -->
        <section class="grid md:grid-cols-2 lg:grid-cols-4 gap-6 p-8">

            <div class="bg-white rounded-xl shadow p-6">
                <h3 class="text-gray-500">Patients</h3>
                <p class="text-4xl font-bold text-blue-700 mt-3">350</p>
            </div>

            <div class="bg-white rounded-xl shadow p-6">
                <h3 class="text-gray-500">Doctors</h3>
                <p class="text-4xl font-bold text-green-600 mt-3">42</p>
            </div>

            <div class="bg-white rounded-xl shadow p-6">
                <h3 class="text-gray-500">Available Rooms</h3>
                <p class="text-4xl font-bold text-yellow-500 mt-3">18</p>
            </div>

            <div class="bg-white rounded-xl shadow p-6">
                <h3 class="text-gray-500">Today's Appointments</h3>
                <p class="text-4xl font-bold text-red-500 mt-3">25</p>
            </div>

        </section>
        

        <!-- Room Vacancy Table -->
        <section  id="room"  class="p-8">

            <div class="bg-white rounded-xl shadow">

                <div class="flex justify-between items-center p-5 border-b">
                    <h2 class="text-xl font-bold">
                        Room Vacancy
                    </h2>

                    <button class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                        Add Room
                    </button>
                </div>

                <div class="">

                    <table class="w-full">

                        <thead class="bg-gray-100">
                            <tr>
                                <th class="p-4 text-left">Room No</th>
                                <th class="p-4 text-left">Type</th>
                                <th class="p-4 text-left">Floor</th>
                                <th class="p-4 text-left">Status</th>
                                <th class="p-4 text-left">Action</th>
                            </tr>
                        </thead>

                        <tbody>

                            <tr class="border-b hover:bg-gray-50">
                                <td class="p-4">101</td>
                                <td>General</td>
                                <td>1st</td>
                                <td>
                                    <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full">
                                        Available
                                    </span>
                                </td>
                                
                                <td>
                                    <button class="bg-blue-600 text-white px-3 py-1 rounded">
                                        Assign
                                    </button>
                                </td>
                            </tr>

                            <tr class="border-b hover:bg-gray-50">
                                <td class="p-4">202</td>
                                <td>ICU</td>
                                <td>2nd</td>
                                <td>
                                    <span class="bg-red-100 text-red-700 px-3 py-1 rounded-full">
                                        Occupied
                                    </span>
                                </td>
                                <td>
                                    <button class="bg-gray-400 text-white px-3 py-1 rounded">
                                        View
                                    </button>
                                </td>
                            </tr>

                            <tr class="hover:bg-gray-50">
                                <td class="p-4">305</td>
                                <td>Deluxe</td>
                                <td>3rd</td>
                                <td>
                                    <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full">
                                        Available
                                    </span>
                                </td>
                                <td>
                                    <button class="bg-blue-600 text-white px-3 py-1 rounded">
                                        Assign
                                    </button>
                                </td>
                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </section>




    </main>

</div>









</body>
</html>
