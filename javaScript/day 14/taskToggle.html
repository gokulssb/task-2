    <input type="text" id="firstName" placeholder="First Name">
<input type="text" id="lastName" placeholder="Last Name">

<button onclick="showFullName()">Show Full Name</button>

<h2 id="result"></h2>


<input type="password" id="password" placeholder="Enter Password">
<button onclick="checkPassword()">Check Password</button>

<p id="result"></p>




    <h1 id="heading">Welcome</h1>

    <button onclick="changeHeading()">Change Heading</button>

    


    <script>
const data =()=>{
  let value= document.getElementById("input").value
  document.getElementById("result").textContent="hero name"
}


const hide=()=>{
    let para =document.getElementById("par")
    if(para.style.display=="none"){
        para.style.display="flex"
    }else{
        para.style.display="none"
    }

}

    function checkUser() {
            let username = document.getElementById("username").value;

            if (username === "admin") {
                document.getElementById("result").innerText = "Login Success";
            } else {
                document.getElementById("result").innerText = "Invalid User";
            }
        }


        const showFullName=()=> {
    let firstName = document.getElementById("firstName").value;
    let lastName = document.getElementById("lastName").value;

    document.getElementById("result").innerText = firstName + " " + lastName;
}

const checkPassword=()=> {
    let password = document.getElementById("password").value;

    if (password.length >= 8) {
        document.getElementById("result").innerText = "Strong Password";
    } else {
        document.getElementById("result").innerText = "Weak Password";
    }
}

 function changeHeading() {
            let heading = document.getElementById("heading");

            heading.style.color = "blue";
            heading.innerText = "Heading Changed";
        }


    </script>
