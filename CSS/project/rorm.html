<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORDER form</title>
    <link rel="stylesheet" href="../assest/project.css">
</head>
<body>

    <div style="background-color: black; color: white; padding: 20px; margin: 10px;">
      <center>  <h1>ORDER FORM</h1></center>
    </div> <br>
    <br>

    <div style="background-color: black;color: white; padding: 30px;">
        <form>
            <fieldset>
                <legend style="background-color: blue;"> <h2>ORDER FORM </h2></legend> <br>
             <center>   <label for="Enter name">FULL NAME</label><br><br>

         <input style="border-radius: 20px; height: 30px;" type="text" placeholder="First Name">
             <input style="border-radius: 40px; height: 30px;" type="text" placeholder="Last Name">

<br> <BR></BR>

               <lable>DATE OF APPLICATION</lable>
               <input  style="border-radius: 40px; height: 30px; " type="datetime-local"><br/><br/><br/>   

                <div> 
                <label>DOB</label>
                <input style="border-radius: 40px; height: 30px;" type="tel" placeholder="DD /MM /YEAR"/>
                <lable>AGE</lable>
                <input style="border-radius: 40px; height: 30px;" type="number" min="18" max="40" /><br/><br/><br/>
                </div>

                <div >
                <lable>MOBILE NUMER</lable>
                <input class="mob" style="border-radius: 40px; height: 30px;" type="tel" minlength="10" maxlength="10" placeholder="10 digit number"><br/><br/><br/>
                </div>

                <div>
                <label>GENDER</label>
               <input type="radio" name="GENDER"/>MALE
               <input type="radio" name="GENDER"/>FEMALE  <br/><br/><br/>
               </div>

               <div>
               <lable>EMAIL ADDRESS</lable>
               <input style="border-radius: 40px; height: 30px;" type="email" placeholder="name2@gmail.com"/><br/><br/><br/>
               </div>

               <div>
               <lable>ACCESSORIES </lable>
               <input type="checkbox" name="PROGRAMING LANGUAGE">HELMET
                <input type="checkbox"name="PROGRAMING LANGUAGE">ENGINE OIL
                 <input type="checkbox"name="PROGRAMING LANGUAGE">BRAKES
                  <input type="checkbox"name="PROGRAMING LANGUAGE">TYERS <br/><br/><br/>
                  </div>

                  <div>
                   <lable>PASSWORD</lable>
                  <input  style="border-radius: 40px; height: 30px;" type="password" placeholder="Enter password"/>
                   <lable > CONFORM PASSWORD</lable>
                   <input style="border-radius: 40px; height: 30px;" type="password" placeholder="Conform password"/><br/><br/><br/>
                   </div></center>
                   
            </fieldset>
       
        </form>
    </div>
    
</body>
</html>
