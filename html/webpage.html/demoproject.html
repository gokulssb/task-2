

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hospital Room Booking</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <!-- Header -->
  <div class="bg-red-600 text-white text-center p-4 text-2xl font-bold">
    🏥 Hospital Room Vacancy System
  </div>
  <div class="p-6 grid md:grid-cols-2 gap-6">
    <!-- Room List -->
    <div>
      <h2 class="text-xl font-semibold mb-4">Available Rooms</h2>
      <div id="roomList" class="space-y-3"></div>
    </div>
    <!-- Booking Form -->
    <div class="bg-white p-5 rounded shadow">
      <h2 class="text-xl font-semibold mb-4">Admit Patient</h2>
      <input id="patient" type="text" placeholder="Patient Name"
        class="w-full p-2 border mb-3 rounded">
      <input id="age" type="number" placeholder="Age"
        class="w-full p-2 border mb-3 rounded">
      <select id="priority" class="w-full p-2 border mb-3 rounded">
        <option value="">Emergency Level</option>
        <option>Normal</option>
        <option>Urgent</option>
        <option>Critical</option>
      </select>
      <button onclick="bookRoom()"
        class="bg-green-600 text-white px-4 py-2 rounded w-full">
        Book Room
      </button>
      <div id="result" class="mt-4 text-green-700 font-medium"></div>
    </div>
  </div>
  <!-- Facilities Section -->
  <div class="p-6">
    <h2 class="text-xl font-semibold mb-3">Hospital Facilities</h2>
    <ul class="bg-white p-4 rounded shadow list-disc pl-5">
      <li>24/7 Emergency Service</li>
      <li>ICU & Ventilator Support</li>
      <li>Pharmacy</li>
      <li>Laboratory Testing</li>
      <li>Ambulance Service</li>
      <li>Doctor Consultation</li>
    </ul>
  </div>
  <script>
    const rooms = [
      { id: 1, type: "General Ward", available: true },
      { id: 2, type: "Private Room", available: true },
      { id: 3, type: "ICU", available: false }
    ];
    let selectedRoom = null;
    const roomList = document.getElementById("roomList");
    rooms.forEach(room => {
      const div = document.createElement("div");
      div.className = "p-3 bg-white rounded shadow flex justify-between items-center";
      div.innerHTML = `
        <div>
          <h3 class="font-bold">${room.type}</h3>
          <p class="${room.available ? 'text-green-600' : 'text-red-600'}">
            ${room.available ? 'Available' : 'Full'}
          </p>
        </div>
        <button onclick="selectRoom(${room.id})"
          class="bg-blue-500 text-white px-3 py-1 rounded"
          ${!room.available ? 'disabled' : ''}>
          Select
        </button>
      `;
      roomList.appendChild(div);
    });
    function selectRoom(id) {
      selectedRoom = rooms.find(r => r.id === id);
      alert("Selected: " + selectedRoom.type);
    }
    function bookRoom() {
      const patient = document.getElementById("patient").value;
      const age = document.getElementById("age").value;
      const priority = document.getElementById("priority").value;
      const result = document.getElementById("result");
      if (!selectedRoom) {
        alert("Select a room first");
        return;
      }
      if (!patient || !age || !priority) {
        alert("Fill all details");
        return;
      }
      result.innerHTML = `
        ✅ Admission Confirmed! <br>
        👤 Patient: ${patient} <br>
        🎂 Age: ${age} <br>
        🛏️ Room: ${selectedRoom.type} <br>
        ⚠️ Priority: ${priority}
      `;
    }
  </script>
</body>
</html>
